<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>calamine-wasm demo</title>
<style>
  body { font-family: system-ui, sans-serif; max-width: 720px; margin: 3rem auto; padding: 0 1rem; }
  #drop { border: 2px dashed #888; border-radius: 8px; padding: 3rem; text-align: center; color: #666; }
  #drop.over { border-color: #06c; color: #06c; }
  pre { background: #f4f4f4; padding: 1rem; border-radius: 6px; overflow-x: auto; }
</style>
</head>
<body>
<h1>calamine-wasm</h1>
<div id="drop">Drop an .xlsx here or <input type="file" id="pick" accept=".xlsx,.xls,.ods"></div>
<pre id="out">waiting for file…</pre>
<script type="module">
import init, { WasmWorkbook } from "./pkg/web/calamine_wasm.js";

await init();
const out = document.getElementById("out");
const drop = document.getElementById("drop");

async function handle(file) {
  out.textContent = `reading ${file.name} (${(file.size / 1048576).toFixed(2)} MB)…`;
  const bytes = new Uint8Array(await file.arrayBuffer());

  // open once: zip directory + sharedStrings parse
  let t0 = performance.now();
  const wb = new WasmWorkbook(bytes);
  const meta = JSON.parse(wb.meta());
  const openMs = (performance.now() - t0).toFixed(0);

  // stream EVERY sheet via the pull cursor, count rows/cells
  let text = `open (zip dir + sharedStrings): ${openMs} ms\n\n`;
  let sample = "";
  try {
    for (const sheet of meta.sheets) {
      t0 = performance.now();
      let rows = 0;
      let cells = 0;
      wb.openSheet(sheet.index, undefined);
      let json;
      while ((json = wb.nextBatch(10_000)) !== undefined) {
        const batch = JSON.parse(json);
        rows += batch.length;
        for (const r of batch) cells += r.length;
        if (rows === batch.length && batch.length > 0 && !sample) {
          sample = `first row of "${sheet.name}": ${JSON.stringify(batch[0]).slice(0, 200)}`;
        }
      }
      const ms = (performance.now() - t0).toFixed(0);
      text += `sheet ${sheet.index}  ${JSON.stringify(sheet.name).padEnd(24)} ${String(rows).padStart(9)} rows  ${String(cells).padStart(10)} cells  ${ms} ms\n`;
      out.textContent = text;
    }
  } finally {
    wb.free();
  }
  out.textContent = text + `\n${sample}`;
}

document.getElementById("pick").addEventListener("change", (e) => e.target.files[0] && handle(e.target.files[0]));
drop.addEventListener("dragover", (e) => { e.preventDefault(); drop.classList.add("over"); });
drop.addEventListener("dragleave", () => drop.classList.remove("over"));
drop.addEventListener("drop", (e) => {
  e.preventDefault();
  drop.classList.remove("over");
  e.dataTransfer.files[0] && handle(e.dataTransfer.files[0]);
});
</script>
</body>
</html>
